# OpenClaude Configuration
# Copy to ~/.openclaude/config.yaml and edit
# Docs: https://github.com/happy-shine/openclaude

gateway:
  port: 18790
  dataDir: "~/.openclaude"
  logLevel: "info"               # debug | info | warn | error
  logFormat: "pretty"            # pretty | json

claude:
  binary: "claude"
  model: "sonnet"                # sonnet, opus, haiku, or full model ID
  idleTimeoutMs: 600000          # 10 minutes idle timeout for subprocesses
  maxProcesses: 10
  extraArgs: []

auth:
  defaultPolicy: "pairing"      # open | pairing | allowlist | disabled

# Multi-bot configuration (recommended)
bots:
  - name: "my-bot"
    token: "${TELEGRAM_BOT_TOKEN}"
    # model: "opus"              # Override global model per bot
    # extraArgs: []              # Override global extraArgs per bot
    auth:
      dmPolicy: "pairing"       # open | pairing | allowlist | disabled
      groupPolicy: "disabled"   # open | pairing | allowlist | disabled
      allowFrom: []             # Pre-approved Telegram user IDs
      groups:                   # Per-group settings (key = group chat ID)
        # "-1001234567890":
        #   enabled: true
        #   allowFrom: []       # Per-group user allowlist

  # Add more bots:
  # - name: "another-bot"
  #   token: "${ANOTHER_BOT_TOKEN}"
  #   model: "haiku"
  #   auth:
  #     dmPolicy: "pairing"
  #     groupPolicy: "pairing"
